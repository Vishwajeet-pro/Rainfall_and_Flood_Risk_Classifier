<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Risk Classifier - Predictor</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
<nav class="bg-blue-600 shadow-lg">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="text-white text-2xl font-bold flex items-center">
                    <i class="bi bi-water mr-2"></i>Flood Risk Classifier
                </a>
                <div class="hidden md:flex space-x-6">
                    <a href="/" class="text-white hover:text-blue-200 px-3 py-2 rounded transition active:bg-blue-700">Predictor</a>
                    <a href="/analytics" class="text-white hover:text-blue-200 px-3 py-2 rounded transition">Analytics</a>
                </div>
                <!-- Mobile menu button - JS toggle needed for full, but simple for now -->
                <button class="md:hidden text-white">
                    <i class="bi bi-list text-2xl"></i>
                </button>
            </div>
        </div>
    </nav>

<div class="max-w-6xl mx-auto my-12 px-4 md:px-10">
        <div class="bg-white rounded-3xl p-10 shadow-2xl">
            <h1 class="text-5xl md:text-6xl font-black text-blue-600 mb-8">Rainfall & Flood Risk Classifier</h1>
            {% if error %}
            <div class="mt-4 p-4 bg-red-100 border border-red-300 rounded-2xl text-red-800">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/predict" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {% for name in feature_names %}
                <div class="space-y-2">
                    <label for="{{ name|replace(' ', '_') }}" class="block text-sm font-bold capitalize text-gray-700">{{ name }}</label>
                    <input id="{{ name|replace(' ', '_') }}" name="{{ name }}" type="number" step="any" required value="{{ input_data[name] if input_data and (name in input_data) else '' }}" class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500 focus:border-blue-500 transition duration-200 text-lg" />
                </div>
                {% endfor %}

                <div class="col-span-full flex justify-end mt-8">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-xl text-xl shadow-lg hover:shadow-xl transition-all duration-200">Predict Risk</button>
                </div>
            </form>

            {% if prediction %}
            <div class="mt-8 p-6 rounded-2xl font-bold text-2xl shadow-lg {{ 'text-red-700 bg-red-100 border-2 border-red-400' if 'High' in prediction else 'text-green-700 bg-green-100 border-2 border-green-400' }}">{{ prediction }}</div>
            {% endif %}
        </div>
    </div>


</body>
</html>
